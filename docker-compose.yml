version: '2.2'

networks:

  macvlan:
    external:
      name: vpn_net

services:

  openvpn:
    image: stlouisn/openvpn
    container_name: openvpn
    hostname: openvpn
    environment:
      - TZ=location/location
      - VPN_GATEWAY=x.x.x.x
      - LAN_GATEWAY=x.x.x.x
    restart: always
    volumes:
      - ./openvpn/config:/etc/openvpn:rw
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      macvlan:
        ipv4_address: x.x.x.x
    dns: x.x.x.x
    healthcheck:
      test: ping -c 1 -W 3 google.com
      interval: 60s
      timeout: 10s
      retries: 5
