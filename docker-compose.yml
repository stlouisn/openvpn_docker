version: '2.3'

networks:

  vpn_network:
    external:
      name: vpn_macvlan

services:

  openvpn:
    image: stlouisn/openvpn
    container_name: openvpn
    hostname: openvpn
    environment:
      - VPN_GATEWAY=10.0.0.0 # VPN Gateway IP
      - LAN_GATEWAY=192.0.0.0 # Local Router IP
    restart: always
    volumes:
      - ./openvpn/config:/etc/openvpn:rw
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      vpn_network:
        ipv4_address: 192.168.100.2 # Local Container IP
    dns: 10.0.0.0 # VPN Name Server IP
    healthcheck:
      test: ping -c 1 -W 3 google.com
      start_period: 30s
      interval: 60s
      timeout: 10s
      retries: 5

######### EVERYTHING BELOW IS OPTIONAL #########

  transmission:
    image: linuxserver/transmission
    container_name: transmission
    restart: always
    volumes:
      - ./transmission/config:/config:rw
      - ./transmission/downloads:/downloads:rw
      - ./transmission/watched-dir:/watch:rw
    network_mode: service:openvpn
    healthcheck:
      test: curl --fail http://localhost:9091 || exit 1
      start_period: 30s
      interval: 60s
      timeout: 10s
      retries: 3
    depends_on:
      openvpn:
        condition: service_healthy

  radarr:
    image: linuxserver/radarr
    container_name: radarr
    restart: always
    volumes:
      - ./radarr/config:/config:rw
      - ./radarr/downloads:/downloads:rw
      - ./radarr/movies:/movies:rw
    network_mode: service:openvpn
    depends_on:
      transmission:
        condition: service_healthy
