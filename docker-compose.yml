version: '2.3'

networks:

  vpn_network:
    external:
      name: private_network

services:

  openvpn:
    image: stlouisn/openvpn
    container_name: openvpn
    environment:
      - VPN_GATEWAY=10.0.0.0 # VPN Gateway
      - VPN_PORT=443 # VPN Port
      - VPN_PROTOCOL=udp # VPN Protocol
      - LAN_GATEWAY=192.168.0.0 # Local Network Router IP
    restart: always
    volumes:
      - ./openvpn/config:/etc/openvpn:rw
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      vpn_network:
        ipv4_address: 192.168.0.0 # Assign IP to VPN Container
    dns: 10.0.0.0 # VPN Name Server IP
    healthcheck:
      test: ping -c 1 -w 3 -q google.com || (killall -s SIGUSR1 openvpn; exit 1)
      start_period: 30s
      interval: 60s
      timeout: 30s
      retries: 5

######### EVERYTHING BELOW IS OPTIONAL #########

  transmission:
    image: linuxserver/transmission
    container_name: transmission
    restart: always
    volumes:
      - ./transmission/config:/config:rw
      - ./transmission/downloads:/downloads:rw
      - ./transmission/watched-dir:/watch:rw
    network_mode: service:openvpn
    healthcheck:
      test: curl -sS localhost:9091 -o /dev/null && echo 'curl: (0) Successfully connected to localhost port 9091' || exit 1
      start_period: 30s
      interval: 60s
      timeout: 10s
      retries: 3
    depends_on:
      openvpn:
        condition: service_healthy

  radarr:
    image: linuxserver/radarr
    container_name: radarr
    restart: always
    volumes:
      - ./radarr/config:/config:rw
      - ./radarr/downloads:/downloads:rw
      - ./radarr/movies:/movies:rw
    network_mode: service:openvpn
    depends_on:
      transmission:
        condition: service_healthy
